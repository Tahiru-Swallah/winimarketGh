[uwsgi]

# Cloud Run listens on 8080
http = :8080

# Correct Django project root
chdir = /code/winimarket_app
pythonpath = /code/winimarket_app

# Django WSGI app
module = winimarket_app.wsgi:application

master = true
processes = 2
threads = 4
enable-threads = true
single-interpreter = true

# Cloud Run graceful shutdown
die-on-term = true
harakiri = 120
max-requests = 1000
vacuum = true

# --- CLEAN LOGGING ---
# Remove logto and logto2. uWSGI will naturally output to stdout/stderr.
log-date = true
log-format = [uWSGI] %(method) %(uri) => %(status) in %(msecs) ms
# Only log errors/warnings in production to keep it fast
log-level = info
catch-exceptions = true
log-exceptions = true
