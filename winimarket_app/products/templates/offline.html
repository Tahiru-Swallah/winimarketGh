<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | WiniMarket</title>
    <style>
        /* Base Styles */
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: #f8fafc;
            color: #111827;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        /* Card */
        .offline-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 40px 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #2563eb; /* primary brand color */
        }

        p {
            font-size: 1rem;
            margin-bottom: 25px;
            color: #374151;
            line-height: 1.5;
        }

        .offline-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .offline-actions button,
        .offline-actions a {
            background-color: #2563eb;
            color: #fff;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .offline-actions button:hover,
        .offline-actions a:hover {
            background-color: #1e40af;
        }

        .offline-icon {
            font-size: 60px;
            margin-bottom: 20px;
            color: #2563eb;
        }

        @media (max-width: 500px) {
            .offline-card {
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            p {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

    <div class="offline-card">
        <div class="offline-icon">📡</div>
        <h1>You are offline</h1>
        <p>
            It looks like you have lost your internet connection.
            Don’t worry, you can still browse some cached content, or try refreshing when your connection is back.
        </p>

        <div class="offline-actions">
            <button onclick="window.location.reload()">Retry</button>
            <a href="/">Go to Home</a>
        </div>
    </div>

</body>
</html>
