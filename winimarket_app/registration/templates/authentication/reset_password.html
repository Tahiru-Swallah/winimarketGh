{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>Reset Password | WinimarketGh</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Montserrat:wght@400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/auth/login.css' %}">

    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/apple-touch-icon.png'%}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon-16x16.png'%}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon-32x32.png'%}">
    <link rel="manifest" href="/manifest.json">
</head>
<body>
    <!-- FORGOT PASSWORD PAGE -->
    <div class="forgot-password-container">

        <div class="forgot-password-card">

            <div class="forgot-header">
            <h2>Forgot Password?</h2>
            <p>
                Enter your email address and we’ll send you a link to reset your password.
            </p>
            </div>

            <form id="forgotPasswordForm">

            <div class="input-group">
                <label>Email Address</label>
                <input 
                type="email" 
                id="resetEmail"
                placeholder="Enter your email"
                required
                >
            </div>

            <button type="submit" class="reset-btn">
                Send Reset Link
            </button>

            </form>

            <div id="forgotMessage" class="forgot-message"></div>

            <div class="back-login">
            <a href="{% url 'registration:login' %}">
                Back to Login
            </a>
            </div>

        </div>

    </div>


    <script type="module">
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('forgotPasswordForm');
            const emailInput = document.getElementById('resetEmail');
            const messageDiv = document.getElementById('forgotMessage');
            const button = form.querySelector('button');

            form.addEventListener('submit', async (e) => {
                e.preventDefault()

                messageDiv.innerHTML = '';
                messageDiv.className = 'forgot-message';

                button.disabled = true;
                button.innerHTML = 'Sending...';

                try{

                    const response = await fetch("/account/api/password-reset/", {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').getAttribute('content')
                        },
                        body: JSON.stringify({ email: emailInput.value.trim() })
                    })

                    const data = await response.json()

                    if(response.ok){
                        messageDiv.innerHTML = data.message || 'If an account with that email exists, a reset link has been sent. Please 📩 Check your email inbox (and spam folder)';
                        
                        messageDiv.classList.add('success');

                        form.reset();
                    } else {
                        messageDiv.innerHTML = data.error || 'An error occurred. Please try again.';
                        messageDiv.classList.add('error');
                    }

                } catch(err){
                    messageDiv.innerHTML = 'An error occurred. Please try again.';
                    messageDiv.classList.add('error');
                } finally {
                    button.disabled = false;
                    button.innerHTML = 'Send Reset Link';
                }
            })
        })
    </script>
</body>
</html>
