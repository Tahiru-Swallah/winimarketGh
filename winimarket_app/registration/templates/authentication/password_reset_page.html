{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>Reset Password | WinimarketGh</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Montserrat:wght@400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/auth/login.css' %}">

    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/apple-touch-icon.png'%}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon-16x16.png'%}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon-32x32.png'%}">
    <link rel="manifest" href="/manifest.json">
</head>
<body>
    <div class="reset-password-container">

        <div class="reset-password-card">

            <div class="reset-header">
            <h2>Set New Password</h2>
            <p>
                Create a strong new password for your Winimarket account.
            </p>
            </div>

            <form id="resetPasswordForm">

            <!-- New Password -->
            <div class="input-group">
                <label>New Password</label>
                <input 
                type="password"
                id="newPassword"
                placeholder="Enter new password"
                required
                >
            </div>

            <!-- Confirm Password -->
            <div class="input-group">
                <label>Confirm Password</label>
                <input 
                type="password"
                id="confirmPassword"
                placeholder="Confirm new password"
                required
                >
            </div>

            <button type="submit" class="reset-btn">
                Reset Password
            </button>

            </form>

            <div id="resetMessage" class="reset-message"></div>

        </div>

    </div>

    <script type="module">
        document.addEventListener('DOMContentLoaded', () => {
            
            const form = document.getElementById('resetPasswordForm');
            const newPasswordInput = document.getElementById('newPassword');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const resetMessage = document.getElementById('resetMessage');
            const submitBtn = form.querySelector('.reset-btn');


            const pathParts = window.location.pathname.split('/');
            const uid = pathParts[pathParts.length - 3];
            const token = pathParts[pathParts.length - 2];

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                resetMessage.innerHTML = '';
                resetMessage.className = 'reset-message';

                if(newPasswordInput.value !== confirmPasswordInput.value){
                    resetMessage.innerHTML = 'Passwords do not match.';
                    resetMessage.classList.add('error');
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = 'Resetting...';


                try{
                    const response = await fetch('/account/api/password-reset/confirm/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').getAttribute('content')
                        },
                        body: JSON.stringify({
                            uid,
                            token,
                            new_password: newPasswordInput.value
                        })
                    });

                    const data = await response.json();

                    if(response.ok){
                        resetMessage.innerHTML = data.message || 'Password reset successful. You can now log in with your new password.';
                        resetMessage.classList.add('success');
                        form.reset();

                        setTimeout(() => { window.location.href = "/account/login/";}, 2500);
                    } else {
                        resetMessage.innerHTML = data.message || 'Failed to reset password. Please try again.';
                        resetMessage.classList.add('error');
                    }

                } catch(err){
                    resetMessage.innerHTML = 'An error occurred. Please try again.';
                    resetMessage.classList.add('error');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Reset Password';
                }
            })
        })
    </script>
</body>
</html>
